function iconicDecodeNumbersToarrBits(intArray,intPixelSize,intWidthInWhiteAndBlackBits,intHeightInWhiteAndBlackBits){
	var txtFunFunFunIntHeightInWhiteAndBlackBits=intArray.length;
	var txtFunFunFunIntWidthInWhiteAndBlackBits=Math.floor(Math.log(maxValue(intArray))/Math.log(2,10))+1;
	if((txtFunFunFunIntHeightInWhiteAndBlackBits>intHeightInWhiteAndBlackBits)||(txtFunFunFunIntWidthInWhiteAndBlackBits>intWidthInWhiteAndBlackBits))alert("Actual iconic dimensions are ["+intWidthInWhiteAndBlackBits+","+intHeightInWhiteAndBlackBits+"], when iconic dimensions from txtFunFunFun are ["+txtFunFunFunIntWidthInWhiteAndBlackBits+","+txtFunFunFunIntHeightInWhiteAndBlackBits+"]. Image will be trimmed.");
	var arrBits=new Int8Array(intWidthInWhiteAndBlackBits*intHeightInWhiteAndBlackBits);
	var indexBits=-1;
	var i=-1,j=-1;
	var ii=-1,jj=-1;
	for(jj=0;jj<intHeightInWhiteAndBlackBits;jj++){
		if(jj<intArray.length)
			intNumber=intArray[jj];
		else
			intNumber=0;
		for(ii=intWidthInWhiteAndBlackBits-1;ii>=0;ii--){
			indexBits=(Math.floor(jj))*intWidthInWhiteAndBlackBits+Math.floor(ii);
			if(intNumber%2){
				arrBits[indexBits]=1;
			}else{
				arrBits[indexBits]=0;
			}
			intNumber/=2;
			intNumber=Math.floor(intNumber);
		}
	}
	return arrBits;
}
function btnIconicDecodeNumbers(intArray){
	var intColor0R=255,intColor0G=255,intColor0B=255;
	var intColor1R=0,intColor1G=0,intColor1B=0;
	var intColorR=-1,intColorG=-1,intColorB=-1;
	randomChar=Math.floor(Math.random()*maxRandomChar);
	var intHeightInWhiteAndBlackBits=intArray.length;
	var intWidthInWhiteAndBlackBits=Math.floor(Math.log(maxValue(intArray))/Math.log(2,10))+1;
	var strDimensions=prompt("Icon dimensions=["+intWidthInWhiteAndBlackBits+", "+intHeightInWhiteAndBlackBits+"]. Enter [intPixelSize, blnDrawGrid], where intPixelSize>=1 is the size of the square pixel and blnDrawGrid drawing grid, true or false:","[10,false]");
	if(null==strDimensions)return;
	var strDim=strDimensions.substring(1,strDimensions.length-1);	
	var arrDim=strDim.split(",");
	var intNumber=-1;
	var intPixelSize=parseInt(arrDim[0]);
	var blnDrawGrid=arrDim[1];
	if(arrDim.length!=2){
		alert("Incorrect format, please enter [intPixelSize,blnDrawGrid].");
	}
	if(intPixelSize<0||Number.isNaN(intPixelSize)){
			alert("Incorrect intPixelSize found");
			return;
	}
	if(intPixelSize<1){
		alert("intPixelSize<1");
		return;
	}
	if("false"!=blnDrawGrid&&"true"!=blnDrawGrid){
		alert('"false"!=blnDrawGrid&&"true"!=blnDrawGrid');
		return;
	}
	var intImageWidth=intPixelSize*intWidthInWhiteAndBlackBits;
	var intImageHeight=intPixelSize*intHeightInWhiteAndBlackBits;
	var divResponseData=document.getElementById("responseData");
	divResponseData.innerHTML="<canvas id='iconicCanvas' width='"+intImageWidth+"' height='"+intImageHeight+" '></canvas>"
	var iconicCanvas=document.getElementById("iconicCanvas");
	iconicCanvas.style="border: 1px solid #ff3c00";
	var iconicContext=iconicCanvas.getContext("2d");
	var iconicImage=iconicContext.getImageData(0,0,intImageWidth,intImageHeight);
	var index=-1;
	var i=-1,j=-1;
	var ii=-1,jj=-1;
	//var intColor=-1;
	for(jj=0;jj<intHeightInWhiteAndBlackBits;jj++){
		if(jj<intArray.length)
			intNumber=intArray[jj];
		else
			intNumber=0;
		for(ii=intWidthInWhiteAndBlackBits;ii>0;ii--){
			//intColor=(intNumber%2)?0:255;
			if(intNumber%2){
				intColorR=intColor1R;
				intColorG=intColor1G;
				intColorB=intColor1B;
			}else{
				intColorR=intColor0R;
				intColorG=intColor0G;
				intColorB=intColor0B;
			}
			intNumber/=2;
			intNumber=Math.floor(intNumber);
			
			for(j=(jj)*intPixelSize;j<(jj+1)*intPixelSize;j++){
				for(i=(ii-1)*intPixelSize;i<(ii)*intPixelSize;i++){
					index=(j*intImageWidth+i)*4;
					iconicImage.data[index+0]=intColorR;
					iconicImage.data[index+1]=intColorG;
					iconicImage.data[index+2]=intColorB;
					iconicImage.data[index+3]=255;

				}
			
			}
		}
	}
	if("true"==blnDrawGrid){
		for(j=0;j<intImageHeight;j++)
			for(i=0;i<intImageWidth;i++){
				indexImage=(j*intImageWidth+i)*4;
				indexBits=(Math.floor(j/intPixelSize))*intWidthInWhiteAndBlackBits+Math.floor(i/intPixelSize);
				if(0==i%intPixelSize||0==j%intPixelSize){
					iconicImage.data[indexImage+0]=255;
					iconicImage.data[indexImage+1]=60;
					iconicImage.data[indexImage+2]=0;
					iconicImage.data[indexImage+3]=255;
				}
			}

	}
	iconicContext.putImageData(iconicImage,0,0);
}

function encodeData(varString){
	var ii;
	var varArray=varString.split('');
	var txtText="";
	for (ii=0;ii<varArray.length;ii++){
		txtText+=(varArray[ii].charCodeAt(0));
		if (ii<(varArray.length-1))
			txtText+='';
		}
	return txtText;
}
function decodeString(varNumber){
	var varInput=encodeData(varNumber);
	if (varNumber.length<10)
		return String.fromCharCode(varInput);
	else return String.fromCharCode(encode_dB_number(varInput)[0]);
}

function getFloor(fltNumber){
	var intNumber=Math.round(fltNumber);
	var sign=1;
	if (Math.abs(intNumber)>Math.abs(fltNumber)){
		sign=(intNumber>=0)?1:-1;	
		return sign*(Math.abs(intNumber)-1);
	}
	else return intNumber;
}

function drawClassicWatch(current_hour,current_minute,current_second){
	var classicWatchCanvas=document.getElementById("classicWatchCanvas");
	var intWidth=classicWatchCanvas.width;
	var intHeight=classicWatchCanvas.height;
	var intSize=Math.min(intWidth,intHeight);
	var intRadius=intSize/2;
	var intHourAngle=2*Math.PI*((current_hour-3)%12)/12.;
	var intMinuteAngle=2*Math.PI*(current_minute-15)/60.;
	var intSecondAngle=2*Math.PI*(current_second-15)/60.;
	var intHourLength=intSize/3.5;
	var intMinuteLength=intSize/2.5;
	var intSecondLength=intSize/2.5;
	var intScaleLength=intSize/2;
	ctx=classicWatchCanvas.getContext("2d");
	ctx.beginPath();
	ctx.fillStyle="black";
	ctx.rect(0,0,intWidth,intHeight);
	ctx.fill();
	ctx.beginPath();
	ctx.fill();
	ctx.strokeStyle="grey";
	ctx.lineWidth=1;
	ctx.arc(intRadius,intRadius,intRadius,0,2*Math.PI,false);
	ctx.stroke();
	ctx.beginPath();
	ctx.lineWidth=5;
	ctx.moveTo(intRadius,intRadius);
	ctx.lineTo(intRadius+intHourLength*Math.cos(intHourAngle),intRadius+intHourLength*Math.sin(intHourAngle));
	ctx.stroke();
	ctx.beginPath();
	ctx.lineWidth=1;
	ctx.moveTo(intRadius,intRadius);
	ctx.lineTo(intRadius+intMinuteLength*Math.cos(intMinuteAngle),intRadius+intMinuteLength*Math.sin(intMinuteAngle));
	ctx.stroke();
	ctx.beginPath();
	ctx.lineWidth=1;
	ctx.moveTo(intRadius,intRadius);
	ctx.lineTo(intRadius+intSecondLength*Math.cos(intSecondAngle),intRadius+intSecondLength*Math.sin(intSecondAngle));
	ctx.stroke();
	ctx.beginPath();
	var intScaleStartX=0;
	var intScaleStartY=0;
	var intScaleStopX=0;
	var intScaleStopY=0;
	for(var ii=0;ii<12;ii++){
		intScaleStartX=intRadius+intScaleLength*0.9*Math.cos(2*Math.PI*ii/12);
		intScaleStartY=intRadius+intScaleLength*0.9*Math.sin(2*Math.PI*ii/12);
		intScaleEndX=intRadius+(1.*intScaleLength)*Math.cos(2*Math.PI*ii/12);
		intScaleEndY=intRadius+(1.*intScaleLength)*Math.sin(2*Math.PI*ii/12);
     		ctx.moveTo(intScaleStartX,intScaleStartY);
     		ctx.lineTo(intScaleEndX,intScaleEndY);
	}
     	ctx.stroke();
}

function extractStrings(varNumber){
	var discreetBreacket=new Array(Math.ceil((varNumber.length-1)/2));
	var theCounter=(varNumber.length)-2;
	for (theInternalCounter=Math.floor((varNumber.length-1)/2); theInternalCounter>=0; theInternalCounter--){
		discreetBreacket[theInternalCounter]=parseInt(varNumber.substring(theCounter,theCounter+2));
		theCounter-=2;
	}
	return discreetBreacket;
}
function dec2Bin(dvar){
	return secondStage(extractStrings(dvar));
}
function finalizeBin2Dec(bvar){
	return parseInt((bvar+'').replace(/[^01]/gi, ''),2);
}
function dec2Bin(dvar){
	return secondStage(extractStrings(dvar));
}
function maxValue(dB){
	var theMaxValue=0;
	for (theCounter=0;theCounter<dB.length; theCounter++)
	{
		if (dB[theCounter]>theMaxValue){
			theMaxValue=dB[theCounter];
		}
	}
	return theMaxValue;
}
function flushBraecket(dB, dBrests){
	var fltRest=0.;
	for (theCounter=0;theCounter<dB.length; theCounter++){
		fltRest=dB[theCounter]-Math.floor(dB[theCounter]);
		if (fltRest>epsilon)
		{
			if (theCounter<dB.length-1){
				dB[theCounter+1]=dB[theCounter+1]+10*Math.pow(10,2-1)*(fltRest);
				dB[theCounter]=Math.floor(dB[theCounter]);

			}else{
				dBrests[dBrests.length]=(10*fltRest)%2;/*JavaScript specific - writing after table end, extend table - often changes unevitable here while inserting into other languages {timesaveing comment}+-1*/
				dB[theCounter]=Math.floor(dB[theCounter]);

			}
		}
		if(fltRest<=epsilon){
			if (theCounter>=dB.length-1){
				dBrests[dBrests.length]=0;/*JavaScript specific - writing after table end, extend table - often changes unevitable here while inserting into other languages {timesaveing comment}+-1*/
			}
		}
	}
}
function secondStage(dB){
	var shiftsBreacket=new Array(0);	
	var varResult="";
	var pow1, pow2;
	var theCounter;
	pow1=1;
	pow2=Math.pow(10,2-1);
	var dBrests=new Array(0);
	while (maxValue(dB)>epsilon){
		for (theCounter=0;theCounter<dB.length; theCounter++)
			dB[theCounter]=dB[theCounter]/2.;
		flushBraecket(dB, dBrests);
		for (theCounter=0;theCounter<dB.length; theCounter++){
			if (theCounter>=dB.length-1){
				varResult=dBrests[dBrests.length-1]+varResult;
				dB[theCounter]=(Math.floor(pow1*dB[theCounter]))/pow1;
			}
			dB[theCounter]=(Math.floor(pow2*dB[theCounter]))/pow2;
		}

	}	
	return varResult;
}
